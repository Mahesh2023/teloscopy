# =============================================================================
# Teloscopy – Build Android APK & iOS IPA
# =============================================================================
# Builds downloadable app artifacts on every push to android-app branch.
# Creates/updates a GitHub Release with the latest APK and IPA.
# =============================================================================

name: Build Mobile Apps

on:
  push:
    branches: [android-app]
  workflow_dispatch:

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  XCODE_VERSION: "15.4"

jobs:
  # ===========================================================================
  # Build Android Debug APK
  # ===========================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/Teloscopy-${VERSION}-android.apk
          echo "APK_NAME=Teloscopy-${VERSION}-android.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/artifacts/*.apk
          retention-days: 90

    outputs:
      apk_name: ${{ env.APK_NAME }}
      version: ${{ env.VERSION }}

  # ===========================================================================
  # Build iOS App (Simulator .app archive)
  # ===========================================================================
  build-ios:
    name: Build iOS App
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Teloscopy.xcodeproj \
            -scheme Teloscopy \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package simulator app
        run: |
          VERSION=$(grep 'MARKETING_VERSION' Teloscopy.xcodeproj/project.pbxproj | head -1 | sed 's/.*= *\(.*\);/\1/' | tr -d ' "')
          [ -z "$VERSION" ] && VERSION="2.0.0"
          APP_PATH=$(find build -name "Teloscopy.app" -type d | head -1)
          mkdir -p artifacts
          cd "$(dirname "$APP_PATH")"
          zip -r "${GITHUB_WORKSPACE}/ios/artifacts/Teloscopy-${VERSION}-ios-simulator.zip" Teloscopy.app
          echo "IOS_NAME=Teloscopy-${VERSION}-ios-simulator.zip" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/artifacts/*.zip
          retention-days: 90

    outputs:
      ios_name: ${{ env.IOS_NAME }}
      version: ${{ env.VERSION }}

  # ===========================================================================
  # Create / Update GitHub Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Download iOS app
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-android.outputs.version || '2.0.0' }}-latest
          name: "Teloscopy v${{ needs.build-android.outputs.version || '2.0.0' }} — Mobile Apps"
          body: |
            ## Download Mobile Apps

            ### Android
            - **Teloscopy APK** — Install directly on any Android device (Android 8.0+)
            - Enable "Install from unknown sources" in Settings → Security to install

            ### iOS (Simulator)
            - **Teloscopy Simulator App** — Run in Xcode iOS Simulator on Mac
            - Unzip and drag into a running simulator, or use `xcrun simctl install`
            - For device builds, clone the repo and build with Xcode + Apple Developer account

            ### What's New in v2.0
            - Psychiatry counselling with Krishnamurti-inspired dialogic inquiry
            - VADER sentiment analysis with intensity-calibrated responses
            - Trauma First Aid sidebar with crisis hotlines, grounding exercises, safety planning
            - Multi-agent telomere analysis pipeline
            - Health checkup with lab report parsing
          files: release-assets/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
